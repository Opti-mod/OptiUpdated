name: Build
on:
    push:
        branches: [main, dev]
        paths-ignore:
            - "**/*.md"

jobs:
    build:
        name: Build and push
        runs-on: ubuntu-latest

        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Checkout builds
            env:
                RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
            if: ${{ env.RELEASE_TOKEN != '' }}
            uses: actions/checkout@v4
            with:
                repository: "Opti-mod/builds"
                path: "builds"
                token: ${{ secrets.RELEASE_TOKEN }}
                ref: ${{ github.ref_name }}

          - uses: actions/setup-node@v4
            with:
                node-version: 22

          - name: Install pnpm and dependencies
            run: |
                npm i -g pnpm
                pnpm i\

          - name: Build
            run: pnpm build --release-branch=${{ github.ref_name }} --build-minify
          
          # TODO: Check for linting?

          - name: Push builds
            env:
                RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
            if: ${{ env.RELEASE_TOKEN != '' }}
            run: |
                rm $GITHUB_WORKSPACE/builds/* || true
                cp -r dist/* $GITHUB_WORKSPACE/builds || true
                cd $GITHUB_WORKSPACE/builds
                git config --local user.email "actions@github.com"
                git config --local user.name "GitHub Actions"
                git add .
                git commit -m "Build $GITHUB_SHA" || exit 0
                git push

          - name: Purge CDN cache
            env:
                RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
            if: ${{ env.RELEASE_TOKEN != '' }}
            run: |
                curl https://purge.jsdelivr.net/gh/Opti-mod/builds@${{ github.ref_name }}/bunny.js
