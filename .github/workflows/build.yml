name: Build
on:
    push:
        branches: [main, dev]
        paths-ignore:
            - "**/*.md"

jobs:
    build:
        name: Build and push
        runs-on: ubuntu-latest

        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
                token: ${{ secrets.RELEASE_TOKEN || github.token }}

          - uses: actions/setup-node@v4
            with:
                node-version: 22

          - name: Install pnpm and dependencies
            run: |
                npm i -g pnpm
                pnpm i\

          - name: Build
            run: pnpm build --release-branch=${{ github.ref_name }} --build-minify
          
          # TODO: Check for linting?

          - name: Push builds
            run: |
                git config --local user.email "actions@github.com"
                git config --local user.name "GitHub Actions"
                git add dist/
                git commit -m "Build $GITHUB_SHA [skip ci]" || exit 0
                git push

          - name: Purge CDN cache
            run: |
                curl https://purge.jsdelivr.net/gh/Opti-mod/Opti@${{ github.ref_name }}/dist/bunny.js
